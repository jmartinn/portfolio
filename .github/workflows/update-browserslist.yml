name: Update browserslist data

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays, 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-browserslist
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Refresh browserslist data
        run: pnpm dlx update-browserslist-db@latest

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "Browserslist data already current — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: update browserslist data"
          git push
